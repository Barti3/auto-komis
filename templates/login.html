<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie – AutoMarket</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(120deg, #0d6efd, #003d99);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .login-wrapper {
            min-height: calc(100vh - 80px); /* miejsce na navbar */
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            border-radius: 14px;
        }
    </style>
</head>
<body>

{% include "nav_public.html" %}

<div class="container login-wrapper d-flex justify-content-center align-items-center">
    <div class="card login-card shadow-lg p-4">
        <div class="card-body">

            <h3 class="text-center mb-4 fw-bold">Logowanie</h3>

            {% if error %}
                <div class="alert alert-danger text-center">
                    {{ error }}
                </div>
            {% endif %}

            <form action="/login" method="post">

                <div class="mb-3">
                    <label class="form-label">Nazwa użytkownika</label>
                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label class="form-label">Hasło</label>
                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >
                </div>

                <!-- 🔐 Dane techniczne -->
                <input type="hidden" name="screen_width" id="screen_width">
                <input type="hidden" name="screen_height" id="screen_height">
                <input type="hidden" name="timezone" id="timezone">
                <input type="hidden" name="user_agent" id="user_agent">

                <button type="submit" class="btn btn-primary w-100 btn-lg mt-3">
                    Zaloguj się
                </button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">
                    Nie masz konta?
                    <a href="/register" class="fw-semibold text-decoration-none">
                        Zarejestruj się
                    </a>
                </small>
            </div>

        </div>
    </div>
</div>

<script>
    document.getElementById("screen_width").value = screen.width;
    document.getElementById("screen_height").value = screen.height;
    document.getElementById("timezone").value =
        Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById("user_agent").value = navigator.userAgent;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
