<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel admina – AutoMarket</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: #f4f6f8;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding-top: 70px; /* miejsce na navbar */
        }

        .welcome-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px); /* wysokość minus navbar */
        }

        .welcome-card {
            max-width: 600px;
            width: 100%;
            background: rgba(220, 53, 69, 0.1); /* czerwony akcent dla admina */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
            color: #000;
        }

        .welcome-card h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .welcome-card p {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* Wycentrowany navbar */
        .navbar-nav {
            margin: 0 auto;
            text-align: center;
        }

        .navbar-nav .nav-item {
            margin: 0 10px;
        }
    </style>
</head>
<body>

    {% include "nav_admin.html" %}

    <div class="welcome-wrapper">
        <div class="welcome-card">
            <h1>Witaj w panelu administratora!</h1>
            <p>Tu możesz zarządzać użytkownikami, samochodami i całym serwisem.</p>
            <p>Pamiętaj o bezpieczeństwie i ostrożnym administrowaniu! 🛡️</p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
