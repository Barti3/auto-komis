<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja – AutoMarket</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background: linear-gradient(120deg, #0d6efd, #003d99);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .register-wrapper {
            min-height: calc(100vh - 80px); /* miejsce na navbar */
        }

        .register-card {
            max-width: 420px;
            width: 100%;
            border-radius: 14px;
        }
    </style>
</head>
<body>

{% include "nav_public.html" %}

<div class="container register-wrapper d-flex justify-content-center align-items-center">
    <div class="card register-card shadow-lg p-4">
        <div class="card-body">

            <h3 class="text-center mb-4 fw-bold">Rejestracja</h3>

            {% if error %}
                <div class="alert alert-danger text-center">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post" action="/register">

                <div class="mb-3">
                    <label for="username" class="form-label">Nazwa użytkownika</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Hasło</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Powtórz hasło</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        class="form-control"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    Zarejestruj się
                </button>
            </form>

            <div class="text-center mt-4">
                <small class="text-muted">
                    Masz już konto?
                    <a href="/login" class="fw-semibold text-decoration-none">
                        Zaloguj się
                    </a>
                </small>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
