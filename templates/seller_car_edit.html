<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Edytuj ogłoszenie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
{% include "nav_seller.html" %}

<div class="container my-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4">Edytuj ogłoszenie samochodu</h2>

            <form method="post"
                  action="/seller/car/{{ car.id }}/edit"
                  enctype="multipart/form-data">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Tytuł</label>
                        <input type="text" name="title" class="form-control" required value="{{ car.title }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Cena</label>
                        <input type="number" name="price" class="form-control" required value="{{ car.price }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Rok</label>
                        <input type="number" name="year" class="form-control" required value="{{ car.year }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Przebieg</label>
                        <input type="number" name="mileage" class="form-control" required value="{{ car.mileage }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Paliwo</label>
                        <select name="fuel" class="form-select">
                            <option {% if car.fuel == "Benzyna" %}selected{% endif %}>Benzyna</option>
                            <option {% if car.fuel == "Diesel" %}selected{% endif %}>Diesel</option>
                            <option {% if car.fuel == "Hybryda" %}selected{% endif %}>Hybryda</option>
                            <option {% if car.fuel == "Elektryczny" %}selected{% endif %}>Elektryczny</option>
                        </select>
                    </div>

                    <!-- CONDITION -->
                    <div class="col-md-3">
                        <label class="form-label">Stan</label>
                        <select name="condition" class="form-select" required>
                            <option value="Nowy" {% if car.condition == "Nowy" %}selected{% endif %}>Nowy</option>
                            <option value="Używany" {% if car.condition == "Używany" %}selected{% endif %}>Używany</option>
                            <option value="Uszkodzony" {% if car.condition == "Uszkodzony" %}selected{% endif %}>Uszkodzony</option>
                        </select>
                    </div>

                    <!-- BRAND -->
                    <div class="col-md-6">
                        <label class="form-label">Marka</label>

                        <select id="brandSelect" class="form-select" required>
                            <option value="" disabled selected>Wybierz markę...</option>
                            <option value="Inna" class="fw-bold text-primary">Inna (wpiszę ręcznie)</option>
                            
                            <option value="Abarth">Abarth</option>
                            <option value="Acura">Acura</option>
                            <option value="Alfa Romeo">Alfa Romeo</option>
                            <option value="Aston Martin">Aston Martin</option>
                            <option value="Audi">Audi</option>
                            <option value="Bentley">Bentley</option>
                            <option value="BMW">BMW</option>
                            <option value="Bugatti">Bugatti</option>
                            <option value="Buick">Buick</option>
                            <option value="Cadillac">Cadillac</option>
                            <option value="Chevrolet">Chevrolet</option>
                            <option value="Chrysler">Chrysler</option>
                            <option value="Citroen">Citroën</option>
                            <option value="Cupra">Cupra</option>
                            <option value="Dacia">Dacia</option>
                            <option value="Dodge">Dodge</option>
                            <option value="DS Automobiles">DS Automobiles</option>
                            <option value="Ferrari">Ferrari</option>
                            <option value="Fiat">Fiat</option>
                            <option value="Ford">Ford</option>
                            <option value="GMC">GMC</option>
                            <option value="Honda">Honda</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Infiniti">Infiniti</option>
                            <option value="Isuzu">Isuzu</option>
                            <option value="Jaguar">Jaguar</option>
                            <option value="Jeep">Jeep</option>
                            <option value="Kia">Kia</option>
                            <option value="Lada">Lada</option>
                            <option value="Lamborghini">Lamborghini</option>
                            <option value="Lancia">Lancia</option>
                            <option value="Land Rover">Land Rover</option>
                            <option value="Lexus">Lexus</option>
                            <option value="Lincoln">Lincoln</option>
                            <option value="Maserati">Maserati</option>
                            <option value="Maybach">Maybach</option>
                            <option value="Mazda">Mazda</option>
                            <option value="McLaren">McLaren</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="MG">MG</option>
                            <option value="MINI">MINI</option>
                            <option value="Mitsubishi">Mitsubishi</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Opel">Opel</option>
                            <option value="Peugeot">Peugeot</option>
                            <option value="Polestar">Polestar</option>
                            <option value="Porsche">Porsche</option>
                            <option value="RAM">RAM</option>
                            <option value="Renault">Renault</option>
                            <option value="Rolls-Royce">Rolls-Royce</option>
                            <option value="Saab">Saab</option>
                            <option value="Seat">SEAT</option>
                            <option value="Skoda">Skoda</option>
                            <option value="Smart">Smart</option>
                            <option value="SsangYong">SsangYong</option>
                            <option value="Subaru">Subaru</option>
                            <option value="Suzuki">Suzuki</option>
                            <option value="Tesla">Tesla</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Volkswagen">Volkswagen</option>
                            <option value="Volvo">Volvo</option>                        
                        </select>

                        <input type="text"
                               id="customBrandInput"
                               class="form-control mt-2 d-none"
                               value="{{ car.brand }}"
                               placeholder="Wpisz markę..."
                               disabled>
                    </div>

                    <!-- MODEL -->
                    <div class="col-md-6">
                        <label class="form-label">Model</label>

                        <select id="modelSelect" class="form-select"></select>

                        <input type="text"
                               id="modelInput"
                               class="form-control mt-2 d-none"
                               value="{{ car.model }}"
                               placeholder="Wpisz model..."
                               disabled>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Silnik</label>
                        <input type="text" name="engine" class="form-control" value="{{ car.engine }}">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Opis</label>
                        <textarea name="description" class="form-control">{{ car.description }}</textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Dodaj zdjęcia</label>
                        <input type="file" name="images" class="form-control" multiple>
                    </div>

                </div>

                <div class="mt-4">
                    <button class="btn btn-primary btn-lg">Zapisz</button>
                    <a href="/cars" class="btn btn-secondary btn-lg">Anuluj</a>
                </div>

            </form>
        </div>
    </div>
</div>

        "RAM": ["1500", "2500", "3500"],
        "Rolls-Royce": ["Phantom", "Ghost", "Cullinan", "Spectre", "Wraith"],
        "Saab": ["9-3", "9-5"],
        "Smart": ["Fortwo", "Forfour", "#1", "#3"],
        "SsangYong": ["Tivoli", "Korando", "Rexton", "Musso", "Torres"]
    };

const brandSelect = document.getElementById("brandSelect");
const modelSelect = document.getElementById("modelSelect");
const customBrandInput = document.getElementById("customBrandInput");
const modelInput = document.getElementById("modelInput");

const currentBrand = "{{ car.brand }}";
const currentModel = "{{ car.model }}";

function updateForm(brand) {

    if (!carModels[brand]) {
        brandSelect.removeAttribute("name");

        customBrandInput.classList.remove("d-none");
        customBrandInput.disabled = false;
        customBrandInput.setAttribute("name", "brand");

        modelSelect.classList.add("d-none");
        modelSelect.removeAttribute("name");

        modelInput.classList.remove("d-none");
        modelInput.disabled = false;
        modelInput.setAttribute("name", "model");

        return;
    }

    brandSelect.setAttribute("name", "brand");

    customBrandInput.classList.add("d-none");
    customBrandInput.disabled = true;
    customBrandInput.removeAttribute("name");

    modelInput.classList.add("d-none");
    modelInput.disabled = true;
    modelInput.removeAttribute("name");

    modelSelect.classList.remove("d-none");
    modelSelect.setAttribute("name", "model");

    modelSelect.innerHTML = "";

    carModels[brand].forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;

        if (m === currentModel) opt.selected = true;

        modelSelect.appendChild(opt);
    });
}

brandSelect.addEventListener("change", () => {
    updateForm(brandSelect.value);
});

window.addEventListener("DOMContentLoaded", () => {

    // ustawienie aktualnej marki
    if (carModels[currentBrand]) {
        brandSelect.value = currentBrand;
    } else {
        brandSelect.value = "Inna";
    }

    updateForm(currentBrand);
});
</script>

</body>
</html>
