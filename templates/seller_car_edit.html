<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Edytuj ogłoszenie</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card shadow-sm">
        <div class="card-body">

            <h2 class="mb-4">Edytuj ogłoszenie samochodu</h2>

            <form method="post"
                  action="/seller/car/{{ car.id }}/edit"
                  enctype="multipart/form-data"
                  id="carForm">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Tytuł</label>
                        <input type="text" name="title" class="form-control" required value="{{ car.title }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Cena (PLN)</label>
                        <input type="number" name="price" class="form-control" required value="{{ car.price }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Rok</label>
                        <input type="number" name="year" class="form-control" required value="{{ car.year }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Przebieg (km)</label>
                        <input type="number" name="mileage" class="form-control" required value="{{ car.mileage }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Paliwo</label>
                        <select name="fuel" class="form-select">
                            <option {% if car.fuel == "Benzyna" %}selected{% endif %}>Benzyna</option>
                            <option {% if car.fuel == "Diesel" %}selected{% endif %}>Diesel</option>
                            <option {% if car.fuel == "Hybryda" %}selected{% endif %}>Hybryda</option>
                            <option {% if car.fuel == "Elektryczny" %}selected{% endif %}>Elektryczny</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Marka</label>
                        <input type="text" name="brand" class="form-control" required value="{{ car.brand }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Model</label>
                        <input type="text" name="model" class="form-control" required value="{{ car.model }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Pojemność silnika</label>
                        <input type="text" name="engine" class="form-control" value="{{ car.engine }}">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Opis</label>
                        <textarea name="description" rows="4" class="form-control">{{ car.description }}</textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Dodaj nowe zdjęcia (max 50)</label>
                        <input
                            type="file"
                            name="images"
                            id="imagesInput"
                            class="form-control"
                            multiple
                            accept="image/*"
                        >
                    </div>

                </div>

                <!-- PODGLĄD ISTNIEJĄCYCH ZDJĘĆ -->
                <div class="mt-4">
                    <h6>Istniejące zdjęcia</h6>
                    <div id="existingPhotos" class="d-flex flex-wrap gap-3">
                        {% for img in car.images %}
                        <div class="position-relative">
                            <img src="{{ '/static/uploads/' + img.filename }}"
                                 class="rounded shadow"
                                 style="width:150px;height:100px;object-fit:cover;">
                            {% if img.is_main %}
                            <span class="badge bg-success position-absolute top-0 start-0 m-1">Główne</span>
                            {% endif %}
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- PODGLĄD NOWYCH ZDJĘĆ -->
                <div class="mt-4">
                    <h6>Nowe zdjęcia do dodania</h6>
                    <div id="preview" class="d-flex flex-wrap gap-3"></div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Zapisz zmiany</button>
                    <a href="/cars" class="btn btn-secondary btn-lg">Anuluj</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
const input = document.getElementById("imagesInput");
const preview = document.getElementById("preview");

input.addEventListener("change", () => {
    preview.innerHTML = "";
    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
            const div = document.createElement("div");
            div.className = "position-relative";
            div.innerHTML = `
                <img src="${e.target.result}"
                     class="rounded shadow"
                     style="width:150px;height:100px;object-fit:cover;">
            `;
            preview.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
});
</script>

</body>
</html>
