version: "3.9"

services:

  mariadb:
    image: mariadb:11
    container_name: mariadb-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mojehaslo
      MYSQL_DATABASE: auto_komis
      MYSQL_USER: bartek
      MYSQL_PASSWORD: mojehaslo
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  fastapi:
    build:
      context: .
      dockerfile: dockerfile.dev
    container_name: fastapi-app
    restart: always
    depends_on:
      - mariadb
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  nginx:
    image: nginx:stable
    container_name: nginx-proxy
    restart: always
    depends_on:
      - fastapi
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
    ports:
      - "80:80"

volumes:
  mariadb_data:
